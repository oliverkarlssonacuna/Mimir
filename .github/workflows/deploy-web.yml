name: Deploy Web to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "templates/**"
      - "static/**"
      - "Dockerfile.web"
      - "pyproject.toml"
      - ".github/workflows/deploy-web.yml"

env:
  PROJECT_ID: lia-project-sandbox-deletable
  REGION: europe-west4
  SERVICE: mimir-web
  IMAGE: europe-west4-docker.pkg.dev/lia-project-sandbox-deletable/mimir/web

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.web \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=0 \
            --max-instances=5 \
            --set-secrets="SESSION_SECRET=mimir-session-secret:latest,GOOGLE_CLIENT_ID=mimir-google-client-id:latest,GOOGLE_CLIENT_SECRET=mimir-google-client-secret:latest,STEEP_API_TOKEN=mimir-steep-api-token:latest" \
            --set-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }},ALLOWED_DOMAIN=${{ vars.ALLOWED_DOMAIN }},BOT_INTERNAL_URL=${{ vars.BOT_INTERNAL_URL }}"

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "Deployed to: $URL"
